name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Audit
        run: npm audit --audit-level=high
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Public vars: only need to exist for the build to succeed.
          # Real values are injected by Vercel at deploy time.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: https://placeholder.app
          # Private keys: pull from GitHub Actions secrets.
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          STRIPE_SECRET_KEY: placeholder-stripe-key
          STRIPE_WEBHOOK_SECRET: placeholder-webhook-secret

      - name: Bundle analysis
        run: |
          echo "=== Bundle Size Check ==="
          find .next -name '*.js' -size +250k | while read f; do
            size=$(du -k "$f" | cut -f1)
            echo "⚠️  Large chunk: $f (${size}KB)"
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests
